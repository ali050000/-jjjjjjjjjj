
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Security Scan</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    overflow:hidden;
}

#start{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    padding:20px 40px;
    font-size:24px;
    cursor:pointer;
}

#scan{
    display:none;
    position:absolute;
    width:100%;
    height:100%;
    background:black;
    color:white;
    justify-content:center;
    align-items:center;
    font-size:40px;
}

#hack{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    overflow:hidden;
}

#codes{
    position:absolute;
    width:100%;
    height:100%;
    color:#00ff00;
    font-family:monospace;
    font-size:14px;
    white-space:pre;
    opacity:0.6;
}

#message{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:red;
    font-size:64px;
    font-weight:bold;
    z-index:100;
    animation:blink 2s infinite;
}

@keyframes blink{
    0%{opacity:0;}
    50%{opacity:1;}
    100%{opacity:0;}
}
</style>
</head>

<body>

<button id="start">Start Security Scan</button>

<div id="scan">
    Scanning your mobile device...
</div>

<div id="hack">
    <pre id="codes"></pre>
    <div id="message">
        YOU HAVE BEEN HACKED
    </div>
</div>

<script>

document.getElementById("start").onclick=function(){

    document.getElementById("start").style.display="none";
    document.getElementById("scan").style.display="flex";

    setTimeout(function(){

        document.getElementById("scan").style.display="none";
        document.getElementById("hack").style.display="block";

        setInterval(function(){

            let text="";

            for(let i=0;i<40;i++){

                for(let j=0;j<100;j++){
                    text +=
                    "0123456789ABCDEF"
                    [Math.floor(Math.random()*16)];
                }

                text += "\n";
            }

            document.getElementById("codes").textContent=text;

        },100);

    },5000);
};

</script>

</body>
</html>
